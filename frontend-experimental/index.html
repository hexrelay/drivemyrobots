<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DMR - Experimental WebCodecs Player</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 1rem;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            color: #00d9ff;
        }
        #controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            background: #00d9ff;
            border: none;
            color: #1a1a2e;
            font-weight: bold;
        }
        button:hover {
            background: #00b8d9;
        }
        #log {
            font-family: monospace;
            font-size: 12px;
            height: 15em;
            overflow: auto;
            border: 1px solid #333;
            padding: 0.5rem;
            background: #0a0a15;
        }
        canvas {
            background: black;
            width: 640px;
            height: 480px;
            display: block;
            margin-bottom: 1rem;
        }
        .info {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 1rem;
        }
        a {
            color: #00d9ff;
        }
        .color-controls {
            margin-bottom: 1rem;
        }
        .color-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .color-btn {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 3px #000, 0 0 5px #000;
            transition: transform 0.1s, border-color 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn:active {
            transform: scale(0.95);
        }
        .color-btn.selected {
            border-color: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }
        .color-label {
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>DMR - Experimental WebCodecs Player</h1>
    <p class="info">
        This is an experimental low-latency video player using WebCodecs + WebTransport.
        <br>
        <a href="/test/">Back to standard WebRTC player</a>
    </p>

    <div id="controls">
        <button id="connect">Connect</button>
        <span id="status">Disconnected</span>
    </div>

    <canvas id="canvas" width="640" height="480"></canvas>

    <div class="color-controls">
        <span class="color-label">LED Color (press 1-8 or click):</span>
        <div class="color-buttons">
            <button class="color-btn" data-color="red" style="background: #ff0000;">1</button>
            <button class="color-btn" data-color="orange" style="background: #ff8000;">2</button>
            <button class="color-btn" data-color="yellow" style="background: #ffff00; color: #000;">3</button>
            <button class="color-btn" data-color="green" style="background: #00ff00; color: #000;">4</button>
            <button class="color-btn" data-color="cyan" style="background: #00ffff; color: #000;">5</button>
            <button class="color-btn" data-color="blue" style="background: #0000ff;">6</button>
            <button class="color-btn" data-color="purple" style="background: #8000ff;">7</button>
            <button class="color-btn" data-color="white" style="background: #ffffff; color: #000;">8</button>
        </div>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script src="client.js"></script>
    <script>
        const INPUT_STATE_URL = 'https://drivemyrobots.com/api/input_state';
        let selectedColor = null;

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.color === color);
            });
            sendColorCommand(color);
        }

        async function sendColorCommand(color) {
            try {
                const payload = { 'robot1': { 'color': color } };
                const response = await fetch(INPUT_STATE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    log('Sent color: ' + color);
                } else {
                    log('Color command failed: ' + response.status, 'error');
                }
            } catch (error) {
                log('Color command error: ' + error.message, 'error');
            }
        }

        // Click handlers
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => selectColor(btn.dataset.color));
        });

        // Keyboard shortcuts (1-8)
        const colorMap = ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple', 'white'];
        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 8) {
                selectColor(colorMap[num - 1]);
            }
        });
    </script>
</body>
</html>
